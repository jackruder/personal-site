name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install --yes pandoc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test conversion script
        run: make test-script

      - name: Build site
        run: make build

      - name: Smoke-test built output
        run: ./tests/dist.test.sh

